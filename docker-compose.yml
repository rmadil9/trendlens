services:
  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"   # REST API — your Python client talks here
      - "6334:6334"   # gRPC — not used yet, exposed for completeness
    volumes:
      - qdrant_data:/qdrant/storage  # persist vectors across restarts

volumes:
  qdrant_data:
