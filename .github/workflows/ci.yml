name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Cross-encoder weights (test_retrieval_components.py) are pulled from
      # HuggingFace on first use — cache them so repeat runs don't re-download.
      - name: Cache HuggingFace model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-cross-encoder-ms-marco-MiniLM-L-6-v2

      # Unit tests only — deterministic, no external API/service dependency.
      # Anything requiring live Qdrant/OpenAI is tagged @pytest.mark.integration
      # (see backend/tests/README.md) and stays local-only for now.
      - name: Run unit tests
        run: pytest -m "not integration" -v

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
